replicaCount: 1

image:
  repository: ghcr.io/akurin/morjoff-com-website-v2
  pullPolicy: Always
  tag: "latest"

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: morjoff.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: morjoff.com
      hosts:
        - morjoff.com

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
