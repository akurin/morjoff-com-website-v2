name: CI
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Github Packages
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image and push to GitHub Container Registry
        uses: docker/build-push-action@v7
        with:
          tags: |
            ghcr.io/akurin/morjoff-com-website-v2:latest
            ghcr.io/akurin/morjoff-com-website-v2:${{ github.sha }}
          push: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Set k8s context
        uses: Azure/k8s-set-context@v5
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Set up Tailscale VPN
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_KEY }}
          args: --login-server=https://headscale.morjoff.com

      - name: Deploy to Kubernetes with Helm
        run: |
          helm upgrade --install --atomic \
            --set image.tag=${{ github.sha }} \
            morjoff-com-website helm --values helm/values.yaml
